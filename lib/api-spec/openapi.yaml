components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # AUTH
    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        avatar:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, name, email, role, createdAt]

    UpdateProfileBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        avatar:
          type: string

    ChangePasswordBody:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
      required: [currentPassword, newPassword]

    # PAGINATION
    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
      required: [page, limit, total, totalPages]

    # EMPLOYEE
    Employee:
      type: object
      properties:
        id:
          type: integer
        employeeId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        department:
          type: string
        designation:
          type: string
        status:
          type: string
        salary:
          type: number
        joiningDate:
          type: string
        avatar:
          type: string
          nullable: true
        panNumber:
          type: string
          nullable: true
        aadharNumber:
          type: string
          nullable: true
        bankAccount:
          type: string
          nullable: true
        bankName:
          type: string
          nullable: true
        ifscCode:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        emergencyContact:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, employeeId, firstName, lastName, email, department, designation, status, salary, joiningDate, createdAt]

    CreateEmployeeBody:
      type: object
      properties:
        employeeId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        department:
          type: string
        designation:
          type: string
        status:
          type: string
        salary:
          type: number
        joiningDate:
          type: string
        avatar:
          type: string
        panNumber:
          type: string
        aadharNumber:
          type: string
        bankAccount:
          type: string
        bankName:
          type: string
        ifscCode:
          type: string
        address:
          type: string
        emergencyContact:
          type: string
      required: [employeeId, firstName, lastName, email, department, designation, status, salary, joiningDate]

    UpdateEmployeeBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        department:
          type: string
        designation:
          type: string
        status:
          type: string
        salary:
          type: number
        avatar:
          type: string
        panNumber:
          type: string
        aadharNumber:
          type: string
        bankAccount:
          type: string
        bankName:
          type: string
        ifscCode:
          type: string
        address:
          type: string
        emergencyContact:
          type: string

    EmployeeListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Employee"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [data, pagination]

    EmployeeStats:
      type: object
      properties:
        total:
          type: integer
        active:
          type: integer
        inactive:
          type: integer
        byDepartment:
          type: array
          items:
            type: object
            properties:
              department:
                type: string
              count:
                type: integer
            required: [department, count]
      required: [total, active, inactive, byDepartment]

    # ATTENDANCE
    Attendance:
      type: object
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        employeeName:
          type: string
        date:
          type: string
        checkIn:
          type: string
          nullable: true
        checkOut:
          type: string
          nullable: true
        status:
          type: string
        hoursWorked:
          type: number
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, employeeId, employeeName, date, status, createdAt]

    CreateAttendanceBody:
      type: object
      properties:
        employeeId:
          type: integer
        date:
          type: string
        checkIn:
          type: string
        checkOut:
          type: string
        status:
          type: string
        notes:
          type: string
      required: [employeeId, date, status]

    UpdateAttendanceBody:
      type: object
      properties:
        checkIn:
          type: string
        checkOut:
          type: string
        status:
          type: string
        notes:
          type: string

    AttendanceListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Attendance"
        pagination:
          $ref: "#/components/schemas/Pagination"
      required: [data, pagination]

    AttendanceSummary:
      type: object
      properties:
        present:
          type: integer
        absent:
          type: integer
        late:
          type: integer
        halfDay:
          type: integer
        totalWorkingDays:
          type: integer
      required: [present, absent, late, halfDay, totalWorkingDays]

    # PAYROLL
    Payroll:
      type: object
      properties:
        id:
          type: integer
        employeeId:
          type: integer
        employeeName:
          type: string
        month:
          type: string
        basicSalary:
          type: number
        allowances:
          type: number
        deductions:
          type: number
        netSalary:
          type: number
        status:
          type: string
        paidAt:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, employeeId, employeeName, month, basicSalary, allowances, deductions, netSalary, status, createdAt]

    CreatePayrollBody:
      type: object
      properties:
        employeeId:
          type: integer
        month:
          type: string
        basicSalary:
          type: number
        allowances:
          type: number
        deductions:
          type: number
        status:
          type: string
      required: [employeeId, month, basicSalary, allowances, deductions, status]

    UpdatePayrollBody:
      type: object
      properties:
        allowances:
          type: number
        deductions:
